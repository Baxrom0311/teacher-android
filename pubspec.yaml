name: teacher_school_app
description: "O'qituvchilar uchun maktab ilovasi - darslar, davomat va baholarni boshqarish"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # State Management
  flutter_riverpod: 2.5.1
  riverpod: 2.5.1

  # Firebase
  firebase_core: 3.4.0
  firebase_messaging: 15.1.0

  # Network & API
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^7.0.0
  laravel_echo: ^1.0.0-beta.1
  pusher_client: ^2.0.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: 14.2.0

  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.1.2

  # File Handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0

  # Error Handling & Utilities
  equatable: ^2.0.5
  json_annotation: ^4.10.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

dependency_overrides:
  pusher_client:
    path: ../packages/pusher_client

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
